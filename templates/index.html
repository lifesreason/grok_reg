<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grok Register Console</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">NAS Web Console</p>
          <h1>Grok Register</h1>
          <p class="subtitle">配置邮箱后端，启动批量注册任务，并在浏览器中追踪实时日志。</p>
        </div>
        <div class="status-panel">
          <span id="statusText">就绪</span>
          <strong id="statsText">成功 0 / 失败 0</strong>
        </div>
      </section>

      <section class="workspace">
        <form id="configForm" class="config-grid">
          <label>
            邮箱服务商
            <select name="email_provider">
              <option value="duckmail">duckmail</option>
              <option value="yyds">yyds</option>
              <option value="cloudflare">cloudflare</option>
              <option value="cloudmail">cloudmail</option>
            </select>
          </label>
          <label>
            注册数量
            <input name="register_count" type="number" min="1" max="100" value="1" />
          </label>
          <label>
            并发线程
            <input name="register_threads" type="number" min="1" max="10" value="1" />
          </label>
          <label>
            代理
            <input name="proxy" placeholder="Docker 内会把 127.0.0.1 自动映射到 NAS 主机，如 http://127.0.0.1:7890" />
          </label>
          <label>
            DuckMail API Key
            <input name="duckmail_api_key" type="password" autocomplete="off" />
          </label>
          <label>
            YYDS API Key
            <input name="yyds_api_key" type="password" autocomplete="off" />
          </label>
          <label>
            YYDS JWT
            <input name="yyds_jwt" type="password" autocomplete="off" />
          </label>
          <label>
            Cloudflare API Base
            <input name="cloudflare_api_base" placeholder="https://example.workers.dev" />
          </label>
          <label>
            Cloudflare API Key
            <input name="cloudflare_api_key" type="password" autocomplete="off" />
          </label>
          <label>
            Cloudflare 鉴权模式
            <select name="cloudflare_auth_mode">
              <option value="none">none</option>
              <option value="bearer">bearer</option>
              <option value="x-api-key">x-api-key</option>
              <option value="query-key">query-key</option>
            </select>
          </label>
          <label class="wide">
            CF 路径
            <input name="cloudflare_paths" placeholder="/api/domains,/api/new_address,/api/token,/api/mails" />
          </label>
          <label>
            CloudMail URL
            <input name="cloudmail_url" placeholder="https://mail.example.workers.dev" />
          </label>
          <label>
            CloudMail 管理员邮箱
            <input name="cloudmail_admin_email" />
          </label>
          <label>
            CloudMail 管理员密码
            <input name="cloudmail_password" type="password" autocomplete="off" />
          </label>
          <label>
            默认域名
            <input name="defaultDomains" placeholder="a.com,b.com" />
          </label>
          <label>
            grok2api 池名
            <select name="grok2api_pool_name">
              <option value="ssoBasic">ssoBasic</option>
              <option value="ssoSuper">ssoSuper</option>
            </select>
          </label>
          <label class="check">
            <input name="enable_nsfw" type="checkbox" />
            注册后开启 NSFW
          </label>
          <label class="check">
            <input name="grok2api_auto_add_local" type="checkbox" />
            grok2api 本地自动入池
          </label>
          <label class="wide">
            grok2api 本地 token.json
            <input name="grok2api_local_token_file" />
          </label>
          <label>
            grok2api 远端 Base
            <input name="grok2api_remote_base" />
          </label>
          <label>
            grok2api 远端 app_key
            <input name="grok2api_remote_app_key" type="password" autocomplete="off" />
          </label>
          <label>
            sub2api Base
            <input name="sub2api_base" placeholder="https://sub2api.example.com 或 https://sub2api.example.com/api/v1" />
          </label>
          <label>
            sub2api 鉴权模式
            <select name="sub2api_auth_mode">
              <option value="x-api-key">x-api-key</option>
              <option value="bearer">bearer</option>
            </select>
          </label>
          <label>
            sub2api 管理 Token
            <input name="sub2api_admin_token" type="password" autocomplete="off" />
          </label>
          <label>
            sub2api 账号名前缀
            <input name="sub2api_account_name" placeholder="Grok Auto" />
          </label>
          <label>
            sub2api 分组 ID
            <input name="sub2api_group_ids" placeholder="1,2" />
          </label>
          <label>
            sub2api 并发
            <input name="sub2api_concurrency" type="number" min="0" max="1000" value="3" />
          </label>
          <label>
            sub2api 优先级
            <input name="sub2api_priority" type="number" min="0" max="1000" value="50" />
          </label>
        </form>

        <aside class="control-panel">
          <button id="saveBtn" type="button">保存配置</button>
          <button id="startBtn" type="button" class="primary">开始注册</button>
          <button id="stopBtn" type="button" class="danger" disabled>停止任务</button>
          <p id="message" class="message"></p>
        </aside>
      </section>

      <section class="accounts">
        <div class="accounts-head">
          <div>
            <h2>账号管理</h2>
            <p id="accountsSummary">共 0 个账号</p>
          </div>
          <div class="accounts-actions">
            <button id="refreshAccountsBtn" type="button">刷新账号</button>
            <button id="importSub2apiBtn" type="button" class="primary">推送到 sub2api</button>
          </div>
        </div>
        <p class="hint">账号来自 data 目录下的 accounts_*.txt。导入 sub2api 需要账号行包含第四段 Refresh Token，格式为 email----password----sso----refresh_token；历史仅有 sso 的账号会显示但不能推送。</p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>选择</th>
                <th>邮箱</th>
                <th>SSO 摘要</th>
                <th>Refresh Token</th>
                <th>来源文件</th>
                <th>行号</th>
                <th>密码</th>
                <th>推送状态</th>
              </tr>
            </thead>
            <tbody id="accountsBody"></tbody>
          </table>
        </div>
      </section>

      <section class="logs">
        <div class="logs-head">
          <h2>实时日志</h2>
          <span id="jobIdText">无任务</span>
        </div>
        <pre id="logBox"></pre>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
